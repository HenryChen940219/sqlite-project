<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普拉提訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e67e22;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #e67e22;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="pilates">
        <h1>普拉提訓練</h1>
        <div class="exercise">
            <h2>百式</h2>
            <p>仰臥姿勢，雙腿彎曲，抬起雙腿，雙手向下放在身體兩側，保持平衡，腹部收縮。</p>
            <a href="https://youtu.be/d9c8cfEJJac?si=DlB6Rz4JnweJG797">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>鳥犬式</h2>
            <p>四肢着地，右手向前伸出，左腿向後伸直，保持平衡，腹部收縮，重複於另一邊。</p>
            <a href="https://youtu.be/ibqST4wJXo4?si=07m4HCxA_mdoIyCZ">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>卷腹式</h2>
            <p>仰臥姿勢，雙腿彎曲，抬起雙腿，雙手放在頭部後方，用腹部力量將上半身向上抬起，重複動作。</p>
            <a href="https://youtu.be/m-6lp45V5eQ?si=O3AS_h48ZdTKouWy">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>坐姿扭轉</h2>
            <p>坐姿，雙腿伸直，雙手交叉放在胸前，用腹部力量扭轉身體，重複於另一邊。</p>
            <a href="https://youtu.be/d4RXGhq1SVI?si=olR04-HIK0o0D-Sa">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
