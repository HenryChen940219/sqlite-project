<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小腿訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e74c3c;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #e74c3c;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="calves">
        <h1>小腿訓練</h1>
        <div class="exercise">
            <h2>坐姿提踵</h2>
            <p>坐於提踵機上，雙手握住手把，腳掌置於踏板上，然後抬起腳跟，提起踵部，再慢慢放下。</p>
            <a href="https://youtu.be/4Xx_Q4pOG3o?si=6SfYvGE67sI9Wf2R">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>站姿提踵</h2>
            <p>站立，雙腳與肩同寬，腳跟稍微向內，然後抬起腳跟，提起踵部，再慢慢放下。</p>
            <a href="https://youtu.be/aG4aVkwwNpk?si=eFI5rsJ7aWtvyRoj">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
