<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游泳訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2ecc71;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #2ecc71;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="swimming">
        <h1>游泳訓練</h1>
        <div class="exercise">
            <h2>自由式</h2>
            <p>俯臥在水中，用手臂輪流划水，同時踢動雙腿，保持呼吸均勻，享受游泳的愉悅。</p>
            <a href="https://youtu.be/rOXw2ivFWME?si=ZWzKgpUIqB5zrMLK">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>蝶式</h2>
            <p>雙手同時划水，踢動雙腿，保持身體水平，呼吸配合動作，享受蝶式的挑戰。</p>
            <a href="https://youtu.be/zegoCmtJLag?si=knGUUpcO58wljr50">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>仰泳</h2>
            <p>仰臥在水中，用雙臂輪流划水，同時踢動雙腿，保持呼吸均勻，享受仰泳的舒適。</p>
            <a href="https://youtu.be/41JshapBUpc?si=HLbau_Fw1JXkqHHe">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>蛙泳</h2>
            <p>踩水站立，雙手交替向前伸展，同時踢動雙腿，保持呼吸均勻，享受蛙泳的輕鬆。</p>
            <a href="https://youtu.be/gop701ydhMY?si=VB_LBxUhbSJOSI0g">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
