<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腹部訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e40fcb;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #e40fcb;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="abs">
        <h1>腹部訓練</h1>
        <div class="exercise">
            <h2>仰臥起坐</h2>
            <p>仰臥於瑜珈墊或平地上，雙腳彎曲並貼地，雙手放在兩側的耳朵旁，用腹部的力量將上半身向上抬起，直至肩膀離地，然後慢慢放下。</p>
            <a href="https://youtu.be/e_GY_INV9pQ?si=kuNDiDnqiHapm4aZ">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>腹肌滾筒</h2>
            <p>跪坐在地板上，雙手握住滾筒，然後用腹部力量將身體向前滾動，直至身體完全伸直，再慢慢收回。</p>
            <a href="https://youtu.be/y1tf9ImZL6M?si=IocR1C0pCzJaw7LY">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>腹部平板支撐</h2>
            <p>身體俯臥在地板上，雙手撐地，肩膀與手肘呈90度角，保持身體成一直線的姿勢，用腹部力量支撐身體。</p>
            <a href="https://youtu.be/zioaCr82DqA?si=ZR14ghYX_8jSnJkj">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>單腿仰臥起坐</h2>
            <p>仰臥於瑜珈墊或平地上，一腿伸直，一腿彎曲，雙手放在兩側的耳朵旁，用腹部的力量將上半身向彎曲的腿方向抬起，直至肩膀離地，然後慢慢放下。</p>
            <a href="https://youtu.be/eBRWNQHM47o?si=c6e01WZlEUkiGY4Q">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
