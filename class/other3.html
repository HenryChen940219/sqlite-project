<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徒步訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e67e22;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #e67e22;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="walking">
        <h1>徒步訓練</h1>
        <div class="exercise">
            <h2>快步走</h2>
            <p>快速行走，保持步伐平穩，挺直腰背，手臂自然搖擺，每次訓練至少持續30分鐘。</p>
            <a href="https://youtu.be/-3xgkaKrdj0?si=upepPeIkQ9pjxetT">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>登山步行</h2>
            <p>選擇有坡度的路線，步行上山，注重呼吸和姿勢，每次訓練至少持續30分鐘。</p>
            <a href="https://youtu.be/W5axeyc2PAs?si=7BE5-NI61JIRY4s2">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>徒步旅行</h2>
            <p>計畫一段適合的徒步旅行路線，享受自然風景，每次訓練至少持續1小時。</p>
            <a href="https://youtu.be/HuRbMBrCoCA?si=IhjBDpCN_xIwdi_d">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>步行休閒</h2>
            <p>在公園或郊區散步，放鬆心情，每次訓練至少持續20分鐘。</p>
            <a href="https://youtu.be/Ti23Il7uuqE?si=kgfg38se1YS9mt7s">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
