<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臀部訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e74c3c;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #e74c3c;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="glutes">
        <h1>臀部訓練</h1>
        <div class="exercise">
            <h2>深蹲</h2>
            <p>站立，雙腳與肩同寬，雙手自然下垂，然後屈膝蹲下，保持背部挺直，直至大腿與地面平行，再慢慢站起。</p>
            <a href="https://youtu.be/VBWkfazRkhs?si=24TsTZBT1_UfmN_E">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>硬舉</h2>
            <p>站立，雙腳與肩同寬，雙手握住啞鈴或槓鈴，然後彎腰，保持背部挺直，將臀部向後推，直至身體與地面平行，再慢慢站起。</p>
            <a href="https://youtu.be/mGyKvmE7_Zc?si=-1Ra_uaSGJGzQ7dW">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
