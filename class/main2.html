<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腰部訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e40fcb;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #e40fcb;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="waist">
        <h1>腰部訓練</h1>
        <div class="exercise">
            <h2>側彎</h2>
            <p>站立直立，雙手放在身體兩側，慢慢向一側傾斜，讓身體側彎，然後回到起始位置，再向另一側重複動作。</p>
            <a href="https://youtu.be/hfPy1AfYHFU?si=jCu7PRKhTqMj7iVi">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>舉腿</h2>
            <p>趴在瑜珈墊上，雙手放在身體兩側，慢慢抬起一條腿，使大腿離地，然後慢慢放下，再換另一條腿重複動作。</p>
            <a href="https://youtu.be/MtbbzUxH4WA?si=WMBn7AucVi_5xOdC">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>俯身扭轉</h2>
            <p>站立直立，雙手放在腰部，腰部微彎，然後慢慢向一側轉動上身，感受腰部的拉伸，然後回到起始位置，再向另一側重複動作。</p>
            <a href="https://youtu.be/jcxul7h7Vv4?si=m-0lKELWjBQdLd69">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>仰臥腳趾碰觸</h2>
            <p>仰臥在地板上，雙腳伸直向上抬起，然後慢慢彎曲腰部，試著用手指觸摸腳趾，然後慢慢回到起始位置。</p>
            <a href="https://youtu.be/IXIOIeJsqmo?si=qDQVLKdN7ODpC-Vw">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
