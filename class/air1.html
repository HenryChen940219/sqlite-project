<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慢跑訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2ecc71;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #2ecc71;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="running">
        <h1>慢跑訓練</h1>
        <div class="exercise">
            <h2>準備姿勢</h2>
            <p>站直，保持身體挺直，肩膀放鬆，手臂自然擺動。</p>
        </div>
        <div class="exercise">
            <h2>起步慢跑</h2>
            <p>以輕鬆的步伐開始慢跑，注意呼吸與步伐的配合。</p>
        </div>
        <div class="exercise">
            <h2>提速慢跑</h2>
            <p>加快步伐，但仍保持舒適的節奏，注意保持呼吸均勻。</p>
        </div>
        <div class="exercise">
            <h2>冷卻步行</h2>
            <p>結束慢跑後，進行輕鬆的步行，讓身體逐漸恢復正常狀態。</p>
        </div>
        <a href="https://youtu.be/jfOeaWGvxjU?si=2jI2KqaPq41tdcGz">影片請點這裡</a>
    </section>
    
</body>
</html>
