<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑜珈訓練</title>
    <style>
        /* 添加的 CSS 樣式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            color: #444;
            margin: 0;
            padding: 0;
        }
        section {
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e67e22;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .exercise {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #e67e22;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <section id="yoga">
        <h1>瑜珈訓練</h1>
        <div class="exercise">
            <h2>下犬式</h2>
            <p>雙手和雙腳平放於地面，臀部向上抬起，身體形成倒V字型，保持呼吸均勻，放鬆頭部。</p>
            <a href="https://youtu.be/YwFOL6vFfhE?si=u1-x3E1Wwv1s1hEU">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>戰士式</h2>
            <p>雙腿分開，右腳向前迈出，左腳向後伸直，雙臂向上伸直，呼吸均勻，感受腰部和背部的伸展。</p>
            <a href="https://youtu.be/BKWN3VXc8hw?si=yqShQqubrG0Mpz80">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>平衡式</h2>
            <p>站立，將左腳膝蓋抬起，將左手手掌與右腳膝蓋相觸，右手向上伸直，保持平衡，重複於另一邊。</p>
            <a href="https://youtu.be/zenQT8jt5B8?si=8BFVsnM7aDOcifjw">影片請點這裡</a>
        </div>
        <div class="exercise">
            <h2>猫式</h2>
            <p>跪姿，雙手和雙膝放於地面，背部上彎，頭部向下低垂，呼吸均勻，感受背部的伸展。</p>
            <a href="https://youtu.be/-DOF3IuvnH4?si=Pwm-WffwIGv92X3D">影片請點這裡</a>
        </div>
    </section>
</body>
</html>
